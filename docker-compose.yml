services:
  docling-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # ホスト側のソースコードをマウントしてホットリロードを有効化
      - ./src:/app/src
      # 変換データの永続化
      - docling_data:/app/data
    environment:
      - DOCLING_UPLOAD_DIR=/app/data/uploads
      - DOCLING_OUTPUT_DIR=/app/data/output
      - HF_HOME=/app/data/models
    # 開発用コマンド。本番用は Dockerfile の CMD を使用。
    command: uvicorn docling_lib.server:app --host 0.0.0.0 --port 8000 --reload

volumes:
  # 名前付きボリュームを使うことで、ホストの権限問題を回避しつつデータを永続化
  docling_data:
